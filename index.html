<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Nyomtatás Rendelés</title>

<style>
body{
    margin:0;
    background:#f4f6f9;
    font-family:Arial,sans-serif;
}

.container{
    max-width:950px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
    text-align:center;
    color:#1f4e79;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
}

.card{
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
    background:#fafafa;
}

.img{
    height:160px;
    border:2px dashed #bbb;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#777;
    background:white;
}

label{
    display:block;
    margin:10px 0 5px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    margin-top:25px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#1f4e79;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#163b5c;
}

.note{
    margin-top:20px;
    padding:12px 15px;
    background:#fff8e1;
    border:1px solid #ffe082;
    border-radius:8px;
    font-size:14px;
    color:#7a5c00;
}
</style>

</head>
<body>

<div class="container">

<h1>3D nyomtatott termékek rendelése</h1>

<label>Név</label>
<input id="nev">

<label>Telefonszám</label>
<input id="telefon">

<label>E-mail</label>
<input id="email">

<br><br>

<div class="grid" id="products"></div>

<div class="note">
    Megjegyzés: ha a termék csak egy színből készül, a „Második szín" mezőnél válaszd, hogy „Nincs".
</div>

<button onclick="kuldes()">Rendelés elküldése</button>

</div>

<script>

// Termékek automatikus létrehozása

const products=document.getElementById("products");

const szinek=["fehér","fekete","piros","kék","zöld","arany","sárga","szürke","narancs"];

// ====== TERMÉKLISTA ======
// Itt add meg a termékeidet: id, név, és a kép elérési útja.
// A képeket tedd egy "kepek" mappába a html mellé, és itt írd be a fájlnevüket.
// Példa: 1 = porgenytű  ->  { id:1, nev:"Porgenytű", kep:"kepek/porgenytu.jpg" }
const termekLista = [
    { id:1, nev:"Termék 1", kep:"kepek/1.jpg" },
    { id:2, nev:"Termék 2", kep:"kepek/2.jpg" },
    { id:3, nev:"Termék 3", kep:"kepek/3.jpg" },
    { id:4, nev:"Termék 4", kep:"kepek/4.jpg" },
    { id:5, nev:"Termék 5", kep:"kepek/5.jpg" },
    { id:6, nev:"Termék 6", kep:"kepek/6.jpg" },
    { id:7, nev:"Termék 7", kep:"kepek/7.jpg" },
    { id:8, nev:"Termék 8", kep:"kepek/8.jpg" },
    { id:9, nev:"Termék 9", kep:"kepek/9.jpg" },
    { id:10, nev:"Termék 10", kep:"kepek/10.jpg" },
    { id:11, nev:"Termék 11", kep:"kepek/11.jpg" },
    { id:12, nev:"Termék 12", kep:"kepek/12.jpg" },
    { id:13, nev:"Termék 13", kep:"kepek/13.jpg" },
    { id:14, nev:"Termék 14", kep:"kepek/14.jpg" },
    { id:15, nev:"Termék 15", kep:"kepek/15.jpg" },
    { id:16, nev:"Termék 16", kep:"kepek/16.jpg" },

];
// ==========================

function termekOptions(){
    let opts = `<option value="">Válassz terméket</option>`;
    for(const t of termekLista){
        opts += `<option value="${t.id}">${t.nev}</option>`;
    }
    return opts;
}

function szinOptions(masodik){
    let opts = masodik ? `<option value="">Nincs</option>` : `<option value="">Válassz színt</option>`;
    for(const sz of szinek){
        opts += `<option value="${sz}">${sz.charAt(0).toUpperCase()+sz.slice(1)}</option>`;
    }
    return opts;
}

function termekValtozott(i){
    const select = document.getElementById("termeknev"+i);
    const imgBox = document.getElementById("kep"+i);
    const talalt = termekLista.find(t => t.id == select.value);

    if(talalt){
        imgBox.innerHTML = `<img src="${talalt.kep}" alt="${talalt.nev}" style="max-width:100%;max-height:100%;object-fit:contain;" onerror="this.parentElement.innerHTML='Kép nem található';">`;
    } else {
        imgBox.innerHTML = "Kép helye";
    }
}

for(let i=1;i<=9;i++){

    let html=`
    <div class="card">
        <label>Termék kiválasztása</label>

        <select id="termeknev${i}" onchange="termekValtozott(${i})">
            ${termekOptions()}
        </select>

        <div class="img" id="kep${i}">
            Kép helye
        </div>

        <label>Darabszám</label>

        <select id="termek${i}">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>

        <label>Szín kiválasztása</label>

        <select id="szin1_${i}">
            ${szinOptions(false)}
        </select>

        <label>Második szín kiválasztása</label>

        <select id="szin2_${i}">
            ${szinOptions(true)}
        </select>

    </div>
    `;

    products.innerHTML+=html;
}


function kuldes(){

    const adat = {
        nev: document.getElementById("nev").value,
        telefon: document.getElementById("telefon").value,
        email: document.getElementById("email").value
    };

    for(let i=1;i<=9;i++){
        adat["termeknev"+i] = document.getElementById("termeknev"+i).value;
        adat["termek"+i] = document.getElementById("termek"+i).value;
        adat["termek"+i+"_szin1"] = document.getElementById("szin1_"+i).value;
        adat["termek"+i+"_szin2"] = document.getElementById("szin2_"+i).value;
    }

    fetch("https://script.google.com/macros/s/AKfycbzeIbtZSmJ0Rfg88cai-Sd1Ko4WqR5Bs9pOcO65UamT8DhEVo2Jf-bPhbabfsCOtz17tA/exec", {
        method: "POST",
        body: new URLSearchParams({
            data: JSON.stringify(adat)
        })
    })
    .then(res => res.text())
    .then(text => {

        console.log("Server válasz:", text);

        if(text === "OK"){
            alert("✅ Sikeres rendelés!");
        } else {
            alert("⚠️ Valami gond van: " + text);
        }

    })
    .catch(err => {
        console.log(err);
        alert("❌ Hiba történt a küldés során!");
    });

}
</script>

</body>
</html>
